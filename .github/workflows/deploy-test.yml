name: Deploy to Test Theme

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Push to Test Theme
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli

      - name: Deploy to test theme
        run: |
          shopify theme push \
            --store=${{ secrets.SHOPIFY_STORE }} \
            --theme=${{ secrets.SHOPIFY_TEST_THEME_ID }} \
            --allow-live
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
