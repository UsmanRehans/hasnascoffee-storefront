name: Deploy Shopify Theme

on:
  push:
    branches:
      - main        # → deploys to production theme
      - staging     # → deploys to test theme
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - production

jobs:
  deploy:
    name: Deploy to Shopify
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'test' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Shopify access token
        id: get_token
        run: |
          TOKEN=$(curl -s -X POST "https://y0ngah-e1.myshopify.com/admin/oauth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"${{ secrets.SHOPIFY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.SHOPIFY_CLIENT_SECRET }}\",\"grant_type\":\"client_credentials\"}" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "OAuth token fetch failed, falling back to SHOPIFY_THEME_TOKEN"
            TOKEN="${{ secrets.SHOPIFY_THEME_TOKEN }}"
          fi
          echo "::add-mask::$TOKEN"
          echo "shopify_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Set theme ID
        id: set_theme
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "theme_id=${{ secrets.SHOPIFY_PROD_THEME_ID }}" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          else
            echo "theme_id=${{ secrets.SHOPIFY_TEST_THEME_ID }}" >> "$GITHUB_OUTPUT"
            echo "env_name=test" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy theme
        env:
          SHOPIFY_FLAG_STORE: y0ngah-e1.myshopify.com
          SHOPIFY_CLI_THEME_TOKEN: ${{ steps.get_token.outputs.shopify_token }}
        run: |
          shopify theme push \
            --store y0ngah-e1.myshopify.com \
            --theme-id ${{ steps.set_theme.outputs.theme_id }} \
            --allow-live \
            --no-color

      - name: Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ steps.set_theme.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Theme ID:** ${{ steps.set_theme.outputs.theme_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Store:** [y0ngah-e1.myshopify.com](https://y0ngah-e1.myshopify.com)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
