name: Deploy Shopify Theme

on:
  push:
    branches:
      - main        # → deploys to production theme
      - staging     # → deploys to test theme
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - production

jobs:
  deploy:
    name: Deploy to Shopify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
        run: |
          shopify theme push \
            --store y0ngah-e1.myshopify.com \
            --theme "${{ secrets.SHOPIFY_PROD_THEME_ID }}" \
            --allow-live \
            --no-color

      - name: Deploy to test
        if: github.ref != 'refs/heads/main'
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
        run: |
          shopify theme push \
            --store y0ngah-e1.myshopify.com \
            --theme "${{ secrets.SHOPIFY_TEST_THEME_ID }}" \
            --allow-live \
            --no-color

      - name: Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Store:** [y0ngah-e1.myshopify.com](https://y0ngah-e1.myshopify.com)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
